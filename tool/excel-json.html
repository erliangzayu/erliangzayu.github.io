<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OC 角色数据配置工具 - 高级版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .table-input { @apply border border-gray-300 px-1 py-1 w-full rounded focus:outline-none focus:border-blue-500 text-xs text-center; }
        .tab-btn-active { @apply border-b-2 border-blue-500 text-blue-600 font-bold; }
        /* 针对模块2 Excel 样式格子进行特别美化 */
        .excel-cell { @apply min-w-[120px] p-1 border; }
    </style>
</head>
<body class="bg-gray-100 h-screen flex flex-col font-sans">

    <header class="bg-white shadow px-6 py-2.5 flex justify-between items-center shrink-0">
        <div class="flex items-center gap-4">
            <h1 class="text-lg font-bold text-gray-800">🎭 OC 角色数据配置工具 (超宽表格版)</h1>
            <label class="bg-amber-500 hover:bg-amber-600 text-white px-3 py-1.5 rounded text-xs font-medium cursor-pointer transition">
                📥 导入已有 JSON
                <input type="file" id="import-file" accept=".json" class="hidden" onchange="importJSON(event)">
            </label>
        </div>
        <div class="space-x-2">
            <button onclick="copyJSON()" class="bg-gray-600 hover:bg-gray-700 text-white px-4 py-2 rounded text-sm font-medium transition">一键复制 JSON</button>
            <button onclick="downloadJSON()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded text-sm font-medium transition">下载 .json 文件</button>
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden p-3 gap-3">
        
        <section class="w-[70%] bg-white rounded-lg shadow flex flex-col overflow-hidden">
            <div class="flex border-b border-gray-200 bg-gray-50 shrink-0 text-xs">
                <button onclick="switchTab('m1')" id="tab-m1" class="px-4 py-2.5 text-gray-600 hover:text-blue-500 tab-btn-active">1. 基础信息</button>
                <button onclick="switchTab('m2')" id="tab-m2" class="px-4 py-2.5 text-gray-600 hover:text-blue-500">2. 固定日程表 (Excel 样式)</button>
                <button onclick="switchTab('m3')" id="tab-m3" class="px-4 py-2.5 text-gray-600 hover:text-blue-500">3. 随机事件表</button>
                <button onclick="switchTab('m4')" id="tab-m4" class="px-4 py-2.5 text-gray-600 hover:text-blue-500">4. 地点随机话术</button>
            </div>

            <div class="flex-1 overflow-y-auto p-3 space-y-3">
                
                <div id="content-m1" class="tab-content space-y-3">
                    <h3 class="font-bold text-gray-700 text-sm border-b pb-1">角色全局信息</h3>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs text-gray-500 mb-1">角色名 (name)</label>
                            <input type="text" id="m1-name" value="陈墨" oninput="updateAll()" class="table-input text-left text-sm font-medium p-2">
                        </div>
                        <div>
                            <label class="block text-xs text-gray-500 mb-1">头像路径 (avatar)</label>
                            <input type="text" id="m1-avatar" value="images/avatar/chenmo.png" oninput="updateAll()" class="table-input text-left text-sm p-2">
                        </div>
                    </div>
                </div>

                <div id="content-m2" class="tab-content hidden space-y-2">
                    <div class="flex justify-between items-center mb-1">
                        <div>
                            <h3 class="font-bold text-gray-700 text-sm">🗓️ 固定日程视图</h3>
                            <p class="text-[11px] text-gray-400">填入格式：<code>地点|类型|动作</code>（留空代表该天此时段无常规日程）。系统会自动为您合并相同周数。</p>
                        </div>
                        <button onclick="addRow('m2')" class="bg-green-600 hover:bg-green-700 text-white px-2 py-1 rounded text-xs">+ 增加时间段</button>
                    </div>
                    <div class="overflow-x-auto border rounded bg-white">
                        <table class="w-full text-left border-collapse table-fixed min-w-[950px]">
                            <thead>
                                <tr class="bg-gray-100 text-[11px] text-gray-600 text-center font-bold">
                                    <th class="p-1 border w-[110px]">时间范围</th>
                                    <th class="p-1 border">周日 (W0)</th>
                                    <th class="p-1 border">周一 (W1)</th>
                                    <th class="p-1 border">周二 (W2)</th>
                                    <th class="p-1 border">周三 (W3)</th>
                                    <th class="p-1 border">周四 (W4)</th>
                                    <th class="p-1 border">周五 (W5)</th>
                                    <th class="p-1 border">周六 (W6)</th>
                                    <th class="p-1 border w-[40px]">操作</th>
                                </tr>
                            </thead>
                            <tbody id="tbody-m2">
                                <tr class="text-xs">
                                    <td class="p-1 border"><input type="text" value="00:00-07:00" class="table-input font-mono font-bold" oninput="updateAll()"></td>
                                    <td class="excel-cell"><input type="text" value="肆的家|sleep|睡觉中" placeholder="地点|类型|动作" class="table-input" oninput="updateAll()"></td>
                                    <td class="excel-cell"><input type="text" value="肆的家|sleep|睡觉中" class="table-input" oninput="updateAll()"></td>
                                    <td class="excel-cell"><input type="text" value="肆的家|sleep|睡觉中" class="table-input" oninput="updateAll()"></td>
                                    <td class="excel-cell"><input type="text" value="肆的家|sleep|睡觉中" class="table-input" oninput="updateAll()"></td>
                                    <td class="excel-cell"><input type="text" value="肆的家|sleep|睡觉中" class="table-input" oninput="updateAll()"></td>
                                    <td class="excel-cell"><input type="text" value="肆的家|sleep|睡觉中" class="table-input" oninput="updateAll()"></td>
                                    <td class="excel-cell"><input type="text" value="肆的家|sleep|睡觉中" class="table-input" oninput="updateAll()"></td>
                                    <td class="p-1 border text-center"><button onclick="deleteRow(this)" class="text-red-500 hover:text-red-700 font-bold">×</button></td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <div id="content-m3" class="tab-content hidden space-y-2">
                    <div class="flex justify-between items-center mb-1">
                        <h3 class="font-bold text-gray-700 text-sm">⚡ 随机事件横向明细配置</h3>
                        <button onclick="addRow('m3')" class="bg-green-600 hover:bg-green-700 text-white px-2 py-1 rounded text-xs">+ 增加事件分支</button>
                    </div>
                    <div class="overflow-x-auto border rounded">
                        <table class="w-full text-left border-collapse min-w-[950px]">
                            <thead>
                                <tr class="bg-gray-100 text-[11px] text-gray-600 text-center font-bold">
                                    <th class="p-1 border w-16">事件组ID</th>
                                    <th class="p-1 border w-16">触发周数</th>
                                    <th class="p-1 border w-24">时间范围</th>
                                    <th class="p-1 border w-12">概率%</th>
                                    <th class="p-1 border w-16">地点</th>
                                    <th class="p-1 border w-14">类型</th>
                                    <th class="p-1 border">动作名称 (actionName)</th>
                                    <th class="p-1 border w-14">持续</th>
                                    <th class="p-1 border">剧情提示(tip)</th>
                                    <th class="p-1 border w-14">必选</th>
                                    <th class="p-1 border w-10">操作</th>
                                </tr>
                            </thead>
                            <tbody id="tbody-m3">
                                <tr class="text-xs">
                                    <td class="p-1 border"><input type="text" value="ev_01" class="table-input" oninput="updateAll()"></td>
                                    <td class="p-1 border"><input type="text" value="1-5" class="table-input font-mono" oninput="updateAll()"></td>
                                    <td class="p-1 border"><input type="text" value="12:00-13:00" class="table-input font-mono" oninput="updateAll()"></td>
                                    <td class="p-1 border"><input type="text" value="30" class="table-input" oninput="updateAll()"></td>
                                    <td class="p-1 border"><input type="text" value="天台" class="table-input" oninput="updateAll()"></td>
                                    <td class="p-1 border"><input type="text" value="rest" class="table-input" oninput="updateAll()"></td>
                                    <td class="p-1 border"><input type="text" value="吹风看风景" class="table-input text-left" oninput="updateAll()"></td>
                                    <td class="p-1 border"><input type="text" value="否" class="table-input" oninput="updateAll()"></td>
                                    <td class="p-1 border"><input type="text" value="" class="table-input text-left" oninput="updateAll()"></td>
                                    <td class="p-1 border"><input type="text" value="是" class="table-input" oninput="updateAll()"></td>
                                    <td class="p-1 border text-center"><button onclick="deleteRow(this)" class="text-red-500 hover:text-red-700 font-bold">×</button></td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <div id="content-m4" class="tab-content hidden space-y-2">
                    <div class="flex justify-between items-center mb-1">
                        <h3 class="font-bold text-gray-700 text-sm">💬 地点随机行为/话术池</h3>
                        <button onclick="addRow('m4')" class="bg-green-600 hover:bg-green-700 text-white px-2 py-1 rounded text-xs">+ 增加话术项</button>
                    </div>
                    <div class="overflow-x-auto border rounded">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="bg-gray-100 text-[11px] text-gray-600 font-bold">
                                    <th class="p-1 border w-28 text-center">地点 (area)</th>
                                    <th class="p-1 border w-28 text-center">活动类型 (type)</th>
                                    <th class="p-1 border px-2">话术/动作内容</th>
                                    <th class="p-1 border w-12 text-center">操作</th>
                                </tr>
                            </thead>
                            <tbody id="tbody-m4">
                                <tr class="text-xs">
                                    <td class="p-1 border"><input type="text" value="咖啡厅" class="table-input" oninput="updateAll()"></td>
                                    <td class="p-1 border"><input type="text" value="rest" class="table-input" oninput="updateAll()"></td>
                                    <td class="p-1 border"><input type="text" value="靠窗的位置风景不错。" class="table-input text-left px-2" oninput="updateAll()"></td>
                                    <td class="p-1 border text-center"><button onclick="deleteRow(this)" class="text-red-500 hover:text-red-700 font-bold">×</button></td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

            </div>
        </section>

        <section class="w-[30%] bg-gray-900 rounded-lg shadow flex flex-col overflow-hidden text-gray-200 font-mono text-[11px] relative">
            <div id="validator-bar" class="bg-gray-800 px-3 py-1.5 border-b border-gray-700 flex flex-col gap-0.5 shrink-0">
                <span class="text-green-400 font-bold">✅ 状态正常</span>
            </div>
            <pre class="flex-1 p-3 overflow-auto bg-gray-950 text-emerald-400 select-all" id="json-output"></pre>
        </section>
    </main>

    <script>
        // --- 核心算法：解析周数标记 ---
        function parseWeeks(weekStr) {
            if (!weekStr) return [];
            let str = weekStr.toString().replace(/\[|\]/g, '').trim();
            if (str.includes('-')) {
                const [start, end] = str.split('-').map(Number);
                const arr = [];
                for (let i = start; i <= end; i++) arr.push(i);
                return arr;
            }
            return str.split(/[,，]/).map(item => parseInt(item.trim())).filter(n => !isNaN(n));
        }

        // --- 核心逻辑：从全新 Excel 样式表格生成最终聚合 JSON ---
        function generateJSON() {
            const result = {};
            const errors = [];

            // 1. 基础字段
            result.name = document.getElementById('m1-name').value.trim();
            result.avatar = document.getElementById('m1-avatar').value.trim();
            
            // 2. 高级聚合：扫描 Excel 样式的固定日程表 (把横向 7 列拆解合并)
            result.baseSchedule = [];
            const m2Rows = document.querySelectorAll('#tbody-m2 tr');
            
            // 核心聚合池：用来打包相同周数数组的 schedule 条目
            const pool = {}; 

            m2Rows.forEach(row => {
                const inputs = row.querySelectorAll('input');
                if (inputs.length < 8) return;
                const timeRange = inputs[0].value.trim();
                if (!timeRange) return;

                // 建立临时容器，捕获当天这一行里每一种内容的具体周数
                const contentToWeeks = {};

                for (let w = 0; w <= 6; w++) {
                    const cellVal = inputs[w + 1].value.trim();
                    if (!cellVal) continue; // 忽略空单元格

                    if (!contentToWeeks[cellVal]) {
                        contentToWeeks[cellVal] = [];
                    }
                    contentToWeeks[cellVal].push(w);
                }

                // 将捕获到的按内容分好组的周数，分类汇总到全局聚合池中
                Object.keys(contentToWeeks).forEach(rawContent => {
                    const weeksArr = contentToWeeks[rawContent];
                    const weeksKey = JSON.stringify(weeksArr); // 数组形态作为 Key 进行物理聚合

                    const parts = rawContent.split('|');
                    if (parts.length < 3) {
                        errors.push(`⚠️ 固定日程 [${timeRange}]：内容格式必须为'地点|类型|动作'`);
                        return;
                    }

                    if (!pool[weeksKey]) {
                        pool[weeksKey] = {
                            week: weeksArr,
                            schedule: []
                        };
                    }

                    pool[weeksKey].schedule.push({
                        timeRange: timeRange,
                        area: parts[0].trim(),
                        type: parts[1].trim(),
                        actionName: parts[2].trim()
                    });
                });
            });
            result.baseSchedule = Object.values(pool);

            // 3. 解析随机事件
            result.randomEvents = [];
            const m3Rows = document.querySelectorAll('#tbody-m3 tr');
            const groupProbCounter = {};

            m3Rows.forEach(row => {
                const inputs = row.querySelectorAll('input');
                if(inputs.length < 10) return;
                const id = inputs[0].value.trim();
                const rawWeek = inputs[1].value.trim();
                const timeRange = inputs[2].value.trim();
                const rate = parseInt(inputs[3].value.trim(), 10) || 0;
                const area = inputs[4].value.trim();
                const type = inputs[5].value.trim();
                const actionName = inputs[6].value.trim();
                const persistStr = inputs[7].value.trim();
                const tip = inputs[8].value.trim();
                const mandatoryStr = inputs[9].value.trim();

                if (!id && !actionName) return;

                if (id) {
                    groupProbCounter[id] = (groupProbCounter[id] || 0) + rate;
                }

                result.randomEvents.push({
                    id,
                    week: parseWeeks(rawWeek),
                    timeRange,
                    rate,
                    area,
                    type,
                    actionName,
                    persist: persistStr === '是' || persistStr === 'true',
                    tip: tip || "",
                    isMandatory: mandatoryStr === '是' || mandatoryStr === 'true'
                });
            });

            // 校验概率
            Object.keys(groupProbCounter).forEach(gId => {
                if (groupProbCounter[gId] !== 100) {
                    errors.push(`❌ 随机事件组 [${gId}] 概率总和为 ${groupProbCounter[gId]}%，不等于 100%`);
                }
            });

            // 4. 解析地点话术
            result.locationRandomActions = {};
            const m4Rows = document.querySelectorAll('#tbody-m4 tr');
            m4Rows.forEach(row => {
                const inputs = row.querySelectorAll('input');
                if(inputs.length < 3) return;
                const area = inputs[0].value.trim();
                const type = inputs[1].value.trim();
                const text = inputs[2].value.trim();

                if (!area || !type || !text) return;

                if (!result.locationRandomActions[area]) result.locationRandomActions[area] = {};
                if (!result.locationRandomActions[area][type]) result.locationRandomActions[area][type] = [];
                result.locationRandomActions[area][type].push(text);
            });

            // 渲染
            document.getElementById('json-output').textContent = JSON.stringify(result, null, 2);
            renderValidator(errors);
        }

        // --- 核心反向解析：把高度解耦的 JSON 优雅地平铺还原回纵向 7 列 Excel 界面 ---
        function importJSON(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    
                    // 1. 基础信息
                    document.getElementById('m1-name').value = data.name || "";
                    document.getElementById('m1-avatar').value = data.avatar || "";

                    // 2. 核心难点：反向展开还原 Excel 矩阵
                    const tbodyM2 = document.getElementById('tbody-m2');
                    tbodyM2.innerHTML = "";
                    
                    if (data.baseSchedule && Array.isArray(data.baseSchedule)) {
                        // 时间段大整合字典：{"00:00-07:00": ["", "", "", ... 7个空位]}
                        const timeMatrix = {};

                        data.baseSchedule.forEach(block => {
                            const activeWeeks = block.week || [];
                            if(block.schedule && Array.isArray(block.schedule)) {
                                block.schedule.forEach(item => {
                                    const tRange = item.timeRange;
                                    if (!tRange) return;

                                    if(!timeMatrix[tRange]) {
                                        timeMatrix[tRange] = Array(7).fill("");
                                    }
                                    
                                    // 把散落的数据精准放回周几对应的格子里
                                    activeWeeks.forEach(wIndex => {
                                        if(wIndex >= 0 && wIndex <= 6) {
                                            timeMatrix[tRange][wIndex] = `${item.area || ''}|${item.type || ''}|${item.actionName || ''}`;
                                        }
                                    });
                                });
                            }
                        });

                        // 渲染还原好的 Excel 矩阵行
                        for (const tRange in timeMatrix) {
                            const cells = timeMatrix[tRange];
                            const tr = document.createElement('tr');
                            tr.className = "text-xs";
                            tr.innerHTML = `
                                <td class="p-1 border"><input type="text" value="${tRange}" class="table-input font-mono font-bold" oninput="updateAll()"></td>
                                ${cells.map(cVal => `<td class="excel-cell"><input type="text" value="${cVal}" class="table-input" oninput="updateAll()"></td>`).join('')}
                                <td class="p-1 border text-center"><button onclick="deleteRow(this)" class="text-red-500 hover:text-red-700 font-bold">×</button></td>
                            `;
                            tbodyM2.appendChild(tr);
                        }
                    }

                    // 3. 还原随机事件表
                    const tbodyM3 = document.getElementById('tbody-m3');
                    tbodyM3.innerHTML = "";
                    if (data.randomEvents && Array.isArray(data.randomEvents)) {
                        data.randomEvents.forEach(ev => {
                            const tr = document.createElement('tr');
                            tr.className = "text-xs";
                            tr.innerHTML = `
                                <td class="p-1 border"><input type="text" value="${ev.id || ''}" class="table-input" oninput="updateAll()"></td>
                                <td class="p-1 border"><input type="text" value="${ev.week ? ev.week.join(',') : ''}" class="table-input font-mono" oninput="updateAll()"></td>
                                <td class="p-1 border"><input type="text" value="${ev.timeRange || ''}" class="table-input font-mono" oninput="updateAll()"></td>
                                <td class="p-1 border"><input type="text" value="${ev.rate || 0}" class="table-input" oninput="updateAll()"></td>
                                <td class="p-1 border"><input type="text" value="${ev.area || ''}" class="table-input" oninput="updateAll()"></td>
                                <td class="p-1 border"><input type="text" value="${ev.type || ''}" class="table-input" oninput="updateAll()"></td>
                                <td class="p-1 border"><input type="text" value="${ev.actionName || ''}" class="table-input text-left" oninput="updateAll()"></td>
                                <td class="p-1 border"><input type="text" value="${ev.persist ? '是' : '否'}" class="table-input" oninput="updateAll()"></td>
                                <td class="p-1 border"><input type="text" value="${ev.tip || ''}" class="table-input text-left" oninput="updateAll()"></td>
                                <td class="p-1 border"><input type="text" value="${ev.isMandatory ? '是' : '否'}" class="table-input" oninput="updateAll()"></td>
                                <td class="p-1 border text-center"><button onclick="deleteRow(this)" class="text-red-500 hover:text-red-700 font-bold">×</button></td>
                            `;
                            tbodyM3.appendChild(tr);
                        });
                    }

                    // 4. 还原地点话术表
                    const tbodyM4 = document.getElementById('tbody-m4');
                    tbodyM4.innerHTML = "";
                    if (data.locationRandomActions) {
                        for (const area in data.locationRandomActions) {
                            for (const type in data.locationRandomActions[area]) {
                                const actionList = data.locationRandomActions[area][type];
                                if (Array.isArray(actionList)) {
                                    actionList.forEach(text => {
                                        const tr = document.createElement('tr');
                                        tr.className = "text-xs";
                                        tr.innerHTML = `
                                            <td class="p-1 border"><input type="text" value="${area}" class="table-input" oninput="updateAll()"></td>
                                            <td class="p-1 border"><input type="text" value="${type}" class="table-input" oninput="updateAll()"></td>
                                            <td class="p-1 border"><input type="text" value="${text}" class="table-input text-left px-2" oninput="updateAll()"></td>
                                            <td class="p-1 border text-center"><button onclick="deleteRow(this)" class="text-red-500 hover:text-red-700 font-bold">×</button></td>
                                        `;
                                        tbodyM4.appendChild(tr);
                                    });
                                }
                            }
                        }
                    }

                    updateAll();
                    alert("📅 成功将高度聚合的 JSON 还原为纵向 Excel 视图表格！");
                } catch (err) {
                    alert("❌ 导入解析失败，错误信息: " + err.message);
                }
            };
            reader.readAsText(file);
        }

        // --- UI 控制辅助函数 ---
        function renderValidator(errors) {
            const container = document.getElementById('validator-bar');
            if (errors.length === 0) {
                container.innerHTML = `<span class="text-green-400 font-bold">✅ 校验通过，数据格式完美契合游戏逻辑！</span>`;
            } else {
                container.innerHTML = errors.map(err => `<span class="text-rose-400 font-medium">${err}</span>`).join('');
            }
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('[id^="tab-"]').forEach(el => el.classList.remove('tab-btn-active'));
            document.getElementById(`content-${tabId}`).classList.remove('hidden');
            document.getElementById(`tab-${tabId}`).classList.add('tab-btn-active');
        }

        function addRow(module) {
            const tbody = document.getElementById(`tbody-${module}`);
            const tr = document.createElement('tr');
            tr.className = "text-xs";
            
            if (module === 'm2') {
                tr.innerHTML = `
                    <td class="p-1 border"><input type="text" value="00:00-00:00" class="table-input font-mono font-bold" oninput="updateAll()"></td>
                    ${Array(7).fill('<td class="excel-cell"><input type="text" value="" placeholder="地点|类型|动作" class="table-input" oninput="updateAll()"></td>').join('')}
                    <td class="p-1 border text-center"><button onclick="deleteRow(this)" class="text-red-500 hover:text-red-700 font-bold">×</button></td>
                `;
            } else if (module === 'm3') {
                tr.innerHTML = `
                    <td class="p-1 border"><input type="text" value="ev_01" class="table-input" oninput="updateAll()"></td>
                    <td class="p-1 border"><input type="text" value="1-5" class="table-input font-mono" oninput="updateAll()"></td>
                    <td class="p-1 border"><input type="text" value="00:00-00:00" class="table-input font-mono" oninput="updateAll()"></td>
                    <td class="p-1 border"><input type="text" value="50" class="table-input" oninput="updateAll()"></td>
                    <td class="p-1 border"><input type="text" value="" class="table-input" oninput="updateAll()"></td>
                    <td class="p-1 border"><input type="text" value="" class="table-input" oninput="updateAll()"></td>
                    <td class="p-1 border"><input type="text" value="" class="table-input text-left" oninput="updateAll()"></td>
                    <td class="p-1 border"><input type="text" value="否" class="table-input" oninput="updateAll()"></td>
                    <td class="p-1 border"><input type="text" value="" class="table-input text-left" oninput="updateAll()"></td>
                    <td class="p-1 border"><input type="text" value="是" class="table-input" oninput="updateAll()"></td>
                    <td class="p-1 border text-center"><button onclick="deleteRow(this)" class="text-red-500 hover:text-red-700 font-bold">×</button></td>
                `;
            } else if (module === 'm4') {
                tr.innerHTML = `
                    <td class="p-1 border"><input type="text" value="" class="table-input" oninput="updateAll()"></td>
                    <td class="p-1 border"><input type="text" value="" class="table-input" oninput="updateAll()"></td>
                    <td class="p-1 border"><input type="text" value="" class="table-input text-left px-2" oninput="updateAll()"></td>
                    <td class="p-1 border text-center"><button onclick="deleteRow(this)" class="text-red-500 hover:text-red-700 font-bold">×</button></td>
                `;
            }
            tbody.appendChild(tr);
            updateAll();
        }

        function deleteRow(button) {
            button.closest('tr').remove();
            updateAll();
        }

        function updateAll() {
            generateJSON();
        }

        function copyJSON() {
            const jsonText = document.getElementById('json-output').textContent;
            navigator.clipboard.writeText(jsonText).then(() => {
                alert('🚀 JSON 已经成功复制到您的剪贴板！');
            });
        }

        function downloadJSON() {
            const jsonText = document.getElementById('json-output').textContent;
            const roleName = document.getElementById('m1-name').value.trim() || 'role';
            const blob = new Blob([jsonText], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${roleName}.json`;
            a.click();
            URL.revokeObjectURL(url);
        }

        window.onload = function() {
            generateJSON();
        };
    </script>
</body>
</html>
