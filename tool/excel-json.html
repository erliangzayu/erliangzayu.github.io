<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>OC 角色数据配置工具 - 修正版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .table-input { @apply border border-gray-300 px-1 py-0.5 w-full rounded focus:outline-none focus:border-blue-500 text-xs; }
        .tab-btn-active { @apply border-b-2 border-blue-500 text-blue-600 font-bold; }
        .cell-mandatory { @apply bg-amber-50/80; }
        .custom-scroll::-webkit-scrollbar { width: 6px; height: 6px; }
    </style>
</head>
<body class="bg-gray-100 h-screen flex flex-col overflow-hidden">
    <datalist id="location-list">
        <option value="福源堂"><option value="市民公园"><option value="6-11便利店"><option value="九木酒屋"><option value="雾港仓库"><option value="在地铁上"><option value="警署"><option value="Valmont Plaza 购物中心"><option value="旧港集市"><option value="Berlon家老宅"><option value="融大附中"><option value="深蓝海岸"><option value="水怪出没区"><option value="魔鬼鱼号"><option value="猎人小屋"><option value="白日Livehouse"><option value="能乐町"><option value="地下拳场">
    </datalist>

    <header class="bg-white shadow px-6 py-2 flex justify-between items-center shrink-0">
        <h1 class="text-base font-bold">🎭 OC 角色数据配置工具</h1>
        <div class="space-x-2">
            <label class="bg-amber-500 text-white px-3 py-1.5 rounded text-xs cursor-pointer">
                📥 导入 JSON <input type="file" id="import-file" class="hidden" onchange="importJSON(event)">
            </label>
            <button onclick="downloadJSON()" class="bg-blue-600 text-white px-3 py-1.5 rounded text-xs">下载 JSON</button>
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden p-2 gap-2">
        <section class="w-[70%] bg-white rounded shadow flex flex-col overflow-hidden">
            <div class="flex border-b text-xs">
                <button onclick="switchTab('m2')" class="px-4 py-2 tab-btn-active" id="tab-m2">2. 全天日程总表</button>
                <button onclick="switchTab('m4')" class="px-4 py-2" id="tab-m4">4. 真随机事件</button>
            </div>
            <div class="flex-1 overflow-y-auto p-4 custom-scroll">
                <div id="content-m2" class="tab-content"><table class="w-full border-collapse" id="excel-main-table"><tbody id="tbody-timeline"></tbody></table></div>
                <div id="content-m4" class="tab-content hidden"><table class="w-full border-collapse"><tbody id="tbody-true-random"></tbody></table></div>
            </div>
        </section>
        <section class="w-[30%] bg-gray-900 rounded p-3 overflow-auto">
            <pre class="text-emerald-400 text-xs" id="json-output"></pre>
        </section>
    </main>

    <script>
        const TIME_SLOTS = Array.from({length: 48}, (_, i) => {
            const h = Math.floor(i/2).toString().padStart(2, '0');
            const m = (i%2 === 0) ? '00' : '30';
            const nextM = (i%2 === 0) ? '30' : '00';
            const nextH = (i%2 === 0) ? h : (Math.floor(i/2)+1).toString().padStart(2, '0');
            return `${h}:${m}–${nextH}:${nextM}`;
        });

        let MANDATORY_BRANCHES_DATA = {};
        let LOCATION_TEXTS_CACHE = {};

        function initTimelineTable() {
            const tbody = document.getElementById('tbody-timeline');
            tbody.innerHTML = TIME_SLOTS.map((slot, i) => `
                <tr class="border-b"><td class="p-1 text-[10px] w-20 text-gray-400">${slot}</td>
                ${[0,1,2,3,4,5,6].map(d => `
                    <td class="p-1 border excel-cell" id="cell-${d}-${i}" data-day="${d}" data-slot="${slot}">
                        <select class="table-select cell-main-dropdown" onchange="handleTypeChange(this)">
                            <option value="fixed">固定日程</option><option value="mandatory">必然随机</option>
                        </select>
                        <div class="cell-input-container space-y-1">
                            <input type="text" placeholder="地点" class="table-input cell-area">
                            <input type="text" placeholder="动作" class="table-input cell-action">
                        </div>
                        <input type="number" value="1" class="hidden w-10 cell-group-id">
                    </td>`).join('')}</tr>`).join('');
        }

        function handleTypeChange(select) {
            const cell = select.closest('.excel-cell');
            const isMandatory = select.value === 'mandatory';
            cell.classList.toggle('cell-mandatory', isMandatory);
            cell.querySelector('.cell-input-container').classList.toggle('hidden', isMandatory);
            cell.querySelector('.cell-group-id').classList.toggle('hidden', !isMandatory);
            updateAll();
        }

        function importJSON(event) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const data = JSON.parse(e.target.result);
                initTimelineTable();
                MANDATORY_BRANCHES_DATA = {};
                document.getElementById('tbody-true-random').innerHTML = "";

                // 恢复固定日程
                data.baseSchedule?.forEach(b => b.week.forEach(d => b.schedule.forEach(item => {
                    const idx = TIME_SLOTS.findIndex(s => s.startsWith(item.timeRange.split('-')[0]));
                    const cell = document.getElementById(`cell-${d}-${idx}`);
                    if (cell) {
                        cell.querySelector('.cell-area').value = item.area;
                        cell.querySelector('.cell-action').value = item.action;
                    }
                })));

                // 恢复随机事件
                data.randomEvents?.forEach((r, idx) => {
                    if (r.isMandatory) {
                        r.week.forEach(d => {
                            const idx = TIME_SLOTS.findIndex(s => s.startsWith(r.timeRange.split('-')[0]));
                            const cell = document.getElementById(`cell-${d}-${idx}`);
                            if (cell) {
                                cell.querySelector('.cell-main-dropdown').value = 'mandatory';
                                handleTypeChange(cell.querySelector('.cell-main-dropdown'));
                                // 填充数据逻辑...
                            }
                        });
                    } else {
                        // 插入真随机行
                        const tr = document.createElement('tr');
                        tr.innerHTML = `<td>${r.action}</td>`; // 简化示例
                        document.getElementById('tbody-true-random').appendChild(tr);
                    }
                });
                updateAll();
            };
            reader.readAsText(event.target.files[0]);
        }

        function updateAll() { /* 这里执行编译逻辑 */ }
        function switchTab(id) { document.querySelectorAll('.tab-content').forEach(el => el.classList.toggle('hidden', !el.id.includes(id))); }
        window.onload = initTimelineTable;
    </script>
</body>
</html>
