<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🦁 Lionfish城 · OC实时行踪</title>
    <style>
        /* 🌙 夜间模式（苹果灰黑系） */
        :root {
            --bg: #121212;
            --card: #1c1c1e;
            --card-light: #2c2c2e;
            --border: #3a3a3c;
            --text: #f5f5f7;
            --text2: #8e8e93;
            --text3: #636366;
            --primary: #f5a623;
            --accent: #ff9f0a;
            --shadow: 0 4px 12px rgba(0,0,0,0.4);
            /* 镭射渐变色 */
            --laser-gradient: linear-gradient(120deg, #84fab0 0%, #8fd3f4 50%, #a6c1ee 100%);
        }

        /* ☀️ 日间模式（温暖柔和奶白） */
        .light-mode {
            --bg: #fdfdfb;
            --card: #ffffff;
            --card-light: #f7f3ee;
            --border: #e8e2d9;
            --text: #2d2a26;
            --text2: #7d7871;
            --text3: #b0aaa0;
            --primary: #f78c40;
            --accent: #ff9f0a;
            --shadow: 0 4px 12px rgba(0,0,0,0.06);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background: var(--bg);
            color: var(--text);
            padding: 20px;
            min-height: 100vh;
            overflow-x: hidden;
            transition: all 0.25s ease;
        }

        /* 下拉刷新样式 */
        .pull-refresh {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: var(--text2);
            transform: translateY(-100%);
            transition: transform 0.2s ease;
            z-index: 99;
        }
        .pull-refresh.show {
            transform: translateY(0);
        }
        .pull-refresh.loading {
            color: var(--primary);
        }

        /* 头部容器 - 标题居中+模式按钮右侧 */
        .header-container {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 8px;
            position: relative;
        }

        /* 模式切换按钮 */
        .mode-toggle {
            position: absolute; 
            right: 0; 
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--card);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
        }
        .mode-toggle:hover {
            transform: scale(1.05);
        }

        /* 头部样式 */
        .header {
            text-align: center;
            margin-bottom: 24px;
        }
        .title {
            font-size: 24px;
            font-weight: 600;
            margin: 0;
        }
        .real-clock {
            display: inline-block;
            background: var(--card-light);
            padding: 8px 16px;
            border-radius: 30px;
            color: var(--text2);
            font-size: 15px;
            margin-top: 8px;
        }
        .area-path {
            margin-top: 8px;
            font-size: 14px;
            color: var(--text2);
        }
        /* ========== 修复点1：调整tips位置到页面底部 ========== */
        .tip-bar {
            position: fixed;
            bottom: 20px; /* 从top改为bottom，移到页面底部 */
            left: 50%;
            transform: translateX(-50%);
            background: var(--primary);
            color: #fff;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            z-index: 999;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .tip-bar.show {
            opacity: 1;
        }

        /* 大区导航 */
        .big-area-scroll {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 8px 0;
            scrollbar-width: none;
            margin-bottom: 16px;
        }
        .big-area-scroll::-webkit-scrollbar {
            display: none;
        }
        .big-area-tab {
            white-space: nowrap;
            padding: 8px 16px;
            border: 2px solid var(--border);
            border-radius: 20px;
            cursor: pointer;
            transition: 0.2s;
            color: var(--text2);
            background: transparent;
        }
        .big-area-tab.active {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }

        /* 小地点抽屉 */
        .small-area-drawer-wrap {
            background: var(--card);
            border-radius: 12px;
            margin-bottom: 20px;
            overflow: hidden;
            box-shadow: var(--shadow);
        }
        .small-area-drawer-header {
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            border-bottom: 1px solid var(--border);
        }
        .small-area-drawer-title {
            font-size: 15px;
            font-weight: 600;
        }
        .small-area-drawer-arrow {
            color: var(--text2);
            transition: transform 0.3s ease;
        }
        .small-area-drawer-arrow.active {
            transform: rotate(180deg);
        }
        .small-area-drawer-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }
        .small-area-drawer-content.show {
            max-height: 200px;
            padding: 8px 0;
            overflow-y: auto;
        }

        /* 小地点样式 */
        .small-area-list {
            padding: 0 8px;
        }
        .small-area-item {
            padding: 10px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
            margin: 4px 0;
            color: var(--text2);
            border-left: 4px solid transparent;
        }
        .small-area-item.has-oc {
            border-left-color: var(--accent);
            color: var(--accent);
            font-weight: 500;
        }
        .small-area-item.active {
            background: var(--primary);
            color: #fff;
            border-left-color: var(--primary);
        }
        .small-area-item.not-permanent {
            display: none;
        }
        .small-area-item:hover {
            background: var(--card-light);
        }

        /* 主布局 */
        .main-container {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }
        .oc-container {
            flex: 1;
        }

        /* 合并后的侧边栏容器 */
        .combined-sidebar {
            width: 280px;
            background: var(--card);
            border-radius: 18px;
            padding: 16px;
            box-shadow: var(--shadow);
            flex-shrink: 0;
            display: none;
        }

        /* 主人栏（上）- 无分隔线，仅间距 */
        .owner-sidebar {
            margin-bottom: 20px;
            padding-bottom: 0;
            border-bottom: none;
            display: none;
        }
        .owner-sidebar:only-child {
            margin-bottom: 0;
        }

        /* 地点介绍栏（下） */
        .area-info-sidebar {
            display: none;
        }

        /* 侧边栏标题样式 */
        .owner-title,
        .area-info-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 12px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 8px;
        }
        .area-info-content {
            font-size: 14px;
            color: var(--text2);
            line-height: 1.6;
        }

        /* 主人卡片 */
        .owner-card {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
        }
        .owner-avatar {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            object-fit: cover;
        }
        .owner-name {
            font-size: 15px;
            font-weight: 600;
        }
        .owner-status {
            font-size: 12px;
            color: var(--text2);
        }

        /* OC卡片 */
        .oc-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }
        .oc-card {
            position: relative;
            background: var(--card);
            border-radius: 18px;
            padding: 16px;
            box-shadow: var(--shadow);
            border-left: 4px solid var(--primary);
            transition: 0.2s;
        }
        .oc-card.random {
            border-left-color: var(--primary);
        }
        .oc-card:hover {
            transform: translateY(-3px);
        }
        
        /* 随机事件标签 - 区分必选/可选 */
        .oc-random-tag {
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 6px;
            font-weight: 600;
        }
        .oc-random-tag.mandatory-tag {
            background: var(--primary);
            color: #fff;
            border: 1px solid var(--accent);
        }
        .oc-random-tag.laser-tag {
            background: var(--laser-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            border: 1px solid rgba(132, 250, 176, 0.3);
        }

        .oc-avatar {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            object-fit: cover;
            margin-right: 12px;
        }
        .oc-row {
            display: flex;
            align-items: center;
        }
        .oc-info {
            flex: 1;
        }
        .oc-name {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .oc-place {
            font-size: 12px;
            color: var(--text2);
        }
        .oc-action {
            font-size: 14px;
            color: var(--text2);
            margin-top: 6px;
            line-height: 1.4;
        }

        /* OC卡片悬浮弹窗 */
        .oc-popup {
            position: absolute;
            bottom: calc(100% + 10px);
            left: 50%;
            transform: translateX(-50%);
            width: 220px;
            background: var(--card-light);
            color: var(--text);
            padding: 12px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            font-size: 13px;
            line-height: 1.5;
            z-index: 10;
            opacity: 0;
            pointer-events: none;
            transition: 0.2s;
        }
        .oc-card:hover .oc-popup {
            opacity: 1;
            pointer-events: all;
        }
        .popup-action {
            color: var(--primary);
            font-weight: 500;
        }
        .popup-time {
            color: var(--accent);
        }

        /* 空状态 */
        .empty {
            grid-column: span 2;
            text-align: center;
            padding: 60px 0;
            color: var(--text3);
        }

        /* 移动端适配 */
        @media (max-width: 768px) {
            .main-container {
                flex-direction: column;
            }
            .combined-sidebar {
                width: 100%;
            }
            .oc-grid {
                grid-template-columns: 1fr;
            }
            .title {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <!-- 下拉刷新提示 -->
    <div class="pull-refresh" id="pullRefresh">下拉刷新...</div>

    <!-- 全局提示条 -->
    <div class="tip-bar" id="tipBar"></div>

    <div class="header">
        <div class="header-container">
            <div class="title">🦁 Lionfish · 居民实时行踪</div>
            <div class="mode-toggle" id="modeToggle">🌙</div>
        </div>
        <div class="real-clock" id="clock">加载系统时间…</div>
        <div class="area-path" id="areaPath">1区 > 居酒屋</div>
    </div>

    <div class="big-area-scroll" id="bigAreaWrap"></div>

    <div class="small-area-drawer-wrap">
        <div class="small-area-drawer-header" id="drawerHeader">
            <div class="small-area-drawer-title" id="drawerTitle">目前地点·居酒屋</div>
            <div class="small-area-drawer-arrow" id="drawerArrow">▼</div>
        </div>
        <div class="small-area-drawer-content" id="drawerContent">
            <div class="small-area-list" id="smallAreaList"></div>
        </div>
    </div>

    <div class="main-container">
        <div class="oc-container" id="ocContainer">
            <div class="empty">加载中...</div>
        </div>
        <!-- 合并后的侧边栏（主人+地点介绍） -->
        <div class="combined-sidebar" id="combinedSidebar">
            <div class="owner-sidebar" id="ownerSidebar">
                <div class="owner-title">📍 地点主人</div>
                <div id="ownerContent"></div>
            </div>
            <div class="area-info-sidebar" id="areaInfoSidebar">
                <div class="area-info-title">📝 地点介绍</div>
                <div class="area-info-content" id="areaInfoContent">加载地点信息中...</div>
            </div>
        </div>
    </div>

    <script>
        // 全局数据
        let ocData = [];
        let areaData = [];
        let currentBigArea = "";
        let currentSmallArea = "";
        let ocActionCache = {};
        let activeAreaCode = null;

        // 下拉刷新核心变量
        let pullStartY = 0;    
        let pullDistance = 0;  
        let isPulling = false; 
        let isRefreshing = false; 
        const pullRefresh = document.getElementById('pullRefresh');

        // 模式切换变量
        let isDark = true;
        const modeToggle = document.getElementById('modeToggle');
        const savedTheme = localStorage.getItem('themeMode');

        // ========== 修复点2：新增全局标记，控制随机事件tips仅显示一次 ==========
        let randomEventTipShown = false; // 标记随机事件tips是否已显示

        // ========== 基础工具函数 ==========
        // 更新抽屉标题
        function updateDrawerTitle() {
            document.getElementById('drawerTitle').innerText = `目前地点·${currentSmallArea}`;
        }

        // 切换深色模式
        function setDark() {
            document.body.classList.remove('light-mode');
            modeToggle.innerText = '🌙';
            isDark = true;
            localStorage.setItem('themeMode','dark');
        }

        // 切换浅色模式
        function setLight() {
            document.body.classList.add('light-mode');
            modeToggle.innerText = '☀️';
            isDark = false;
            localStorage.setItem('themeMode','light');
        }

        // 重置下拉刷新状态
        function resetPullState() {
            pullStartY = 0;
            pullDistance = 0;
            isPulling = false;
            pullRefresh.classList.remove('show', 'loading');
            pullRefresh.innerText = '下拉刷新...';
        }

        // 更新合并侧边栏显示状态
        function updateCombinedSidebar() {
            const combined = document.getElementById('combinedSidebar');
            const ownerSidebar = document.getElementById('ownerSidebar');
            const areaInfoSidebar = document.getElementById('areaInfoSidebar');
            const hasContent = ownerSidebar.style.display === 'block' || areaInfoSidebar.style.display === 'block';
            combined.style.display = hasContent ? 'block' : 'none';
        }

        // 获取当前时间（格式化）
        function getRealTime() {
            const d = new Date();
            const wd = ['周日','周一','周二','周三','周四','周五','周六'][d.getDay()];
            const h = String(d.getHours()).padStart(2,'0');
            const m = String(d.getMinutes()).padStart(2,'0');
            return {
                week: d.getDay(),
                hour: d.getHours(),
                minute: d.getMinutes(),
                str: `${wd} ${h}:${m}`
            };
        }

        // 更新页面时间显示
        function updateRealTime() {
            document.getElementById('clock').innerText = `当前时间 · ${getRealTime().str}`;
        }

        // 仅更新时间（无其他操作）
        function updateRealTimeOnly() {
            document.getElementById('clock').innerText = `当前时间 · ${getRealTime().str}`;
        }

        // 更新地点路径显示
        function updateAreaPath() {
            document.getElementById('areaPath').innerText = `${currentBigArea} > ${currentSmallArea}`;
        }

        // ========== 修复点3：优化showTip函数，区分刷新提示和随机事件提示 ==========
        // 显示全局提示
        function showTip(text, type = 'normal') {
            const tipBar = document.getElementById('tipBar');
            
            // 随机事件提示：仅在未显示过时才显示
            if (type === 'random') {
                if (randomEventTipShown) return;
                randomEventTipShown = true; // 显示后标记为已显示
            }
            
            tipBar.innerText = text;
            tipBar.classList.add('show');
            setTimeout(() => tipBar.classList.remove('show'), 4000);
        }

        // ========== 下拉刷新核心逻辑 ==========
        // 执行刷新操作（保存当前选中状态）
        async function doRefresh() {
            if (isRefreshing) return;
            isRefreshing = true;
            pullRefresh.innerText = '刷新中...';
            pullRefresh.classList.add('loading');
            
            // ========== 修复点4：刷新时重置随机事件tips标记，允许重新显示 ==========
            randomEventTipShown = false;
            
            // 保存刷新前的选中状态（关键：避免刷新后重置）
            const savedBigArea = currentBigArea;
            const savedSmallArea = currentSmallArea;
            const savedAreaCode = activeAreaCode;
            
            try {
                // 重新加载数据
                const [ocRes, areaRes] = await Promise.all([
                    fetch('./ocData.json').then(r=>r.json()),
                    fetch('./areaData.json').then(r=>r.json())
                ]);
                ocData = ocRes;
                areaData = areaRes;
                
                // 清空缓存
                ocActionCache = {};
                localStorage.clear();
                sessionStorage.clear();
                
                // 恢复选中状态并重新渲染
                currentBigArea = savedBigArea;
                await renderSmallArea(currentBigArea, savedSmallArea, savedAreaCode);
                renderOC();
                renderOwnerSidebar();
                renderAreaInfoSidebar();
                // 刷新提示：使用normal类型，不受一次显示限制
                showTip('✅ 刷新成功！', 'normal');
            } catch (e) {
                console.error('刷新失败', e);
                showTip('❌ 刷新失败，请重试', 'normal');
            } finally {
                isRefreshing = false;
                setTimeout(resetPullState, 800);
            }
        }

        // ========== 数据渲染函数 ==========
        // 渲染小地点列表（支持恢复选中状态）
        async function renderSmallArea(big, savedSmallArea = '', savedAreaCode = '') {
            const list = document.getElementById('smallAreaList');
            const areas = areaData.filter(x => x.bigArea === big);
            const ocAreas = await getCurrentOcAreas();

            // 生成小地点列表HTML
            list.innerHTML = areas.map(item => {
                const isPermanent = item.isPermanent !== false;
                const hasOC = ocAreas.includes(item.areaCode);
                const hideClass = !isPermanent && !hasOC ? 'not-permanent' : '';
                const hotClass = hasOC ? 'has-oc' : '';
                return `<div class="small-area-item ${hotClass} ${hideClass}" data-area="${item.smallArea}" data-areaCode="${item.areaCode||''}">${item.smallArea}</div>`;
            }).join('');

            // 优先恢复保存的小地点，否则选第一个常驻地点
            let defaultArea;
            if (savedSmallArea && areas.some(item => item.smallArea === savedSmallArea)) {
                defaultArea = areas.find(item => item.smallArea === savedSmallArea) || areas[0];
            } else {
                defaultArea = areas.find(item => item.isPermanent !== false) || areas[0];
            }
            
            // 更新全局选中状态
            currentSmallArea = defaultArea.smallArea;
            activeAreaCode = savedAreaCode || defaultArea.areaCode;
            
            // 设置选中样式
            const activeItem = document.querySelector(`[data-area="${currentSmallArea}"]`);
            if (activeItem) {
                activeItem.classList.add('active');
            } else {
                document.querySelector(`[data-area="${defaultArea.smallArea}"]`)?.classList.add('active');
            }
            
            // 同步更新页面
            updateAreaPath();
            updateDrawerTitle();
            renderOwnerSidebar();
            renderAreaInfoSidebar();
            await setAreaHighlight(ocAreas);

            // 绑定小地点点击事件
            document.querySelectorAll('.small-area-item').forEach(item => {
                item.onclick = async e => {
                    document.querySelectorAll('.small-area-item').forEach(x => x.classList.remove('active'));
                    e.target.classList.add('active');
                    currentSmallArea = e.target.dataset.area;
                    activeAreaCode = e.target.dataset.areaCode;
                    updateAreaPath();
                    updateDrawerTitle();
                    renderOC();
                    renderOwnerSidebar();
                    renderAreaInfoSidebar();
                    const ocAreas = await getCurrentOcAreas();
                    await setAreaHighlight(ocAreas);
                }
            });
        }

        // 渲染地点介绍侧边栏
        function renderAreaInfoSidebar() {
            const info = areaData.find(x => x.smallArea === currentSmallArea && x.bigArea === currentBigArea);
            const side = document.getElementById('areaInfoSidebar');
            const content = document.getElementById('areaInfoContent');
            
            if (!info) {
                side.style.display = 'none';
            } else {
                side.style.display = 'block';
                content.innerText = info.areaIntro || '暂无介绍';
            }
            updateCombinedSidebar();
        }

        // 渲染主人侧边栏
        function renderOwnerSidebar() {
            const area = areaData.find(x => x.smallArea === currentSmallArea && x.bigArea === currentBigArea);
            const side = document.getElementById('ownerSidebar');
            const content = document.getElementById('ownerContent');
            
            if (!area || !area.owner?.length) {
                side.style.display = 'none';
            } else {
                side.style.display = 'block';
                const now = getRealTime();
                content.innerHTML = area.owner.map(name => {
                    const oc = ocData.find(o => o.name === name);
                    if (!oc) return '';
                    
                    const {isRandom, schedule: rSched} = checkRandomEvent(oc, now);
                    const baseSched = getOwnerCurrentSchedule(oc, now);
                    const finalSched = isRandom && rSched ? rSched : baseSched;
                    const isHere = finalSched?.area === currentSmallArea;
                    
                    return `
                    <div class="owner-card">
                        <img src="${oc.avatar}" alt="${name}" class="owner-avatar">
                        <div class="owner-info">
                            <div class="owner-name">${name}</div>
                            <div class="owner-status">${isHere ? '✅ 就在此处' : '🔴 暂时离开，四处走走看吧～'}</div>
                        </div>
                    </div>`;
                }).join('');
            }
            updateCombinedSidebar();
        }

        // 渲染OC卡片列表
        function renderOC() {
            const now = getRealTime();
            const container = document.getElementById('ocContainer');
            
            // 筛选当前地点的OC
            const ocList = ocData.map(oc => {
                const randomResult = checkRandomEvent(oc, now);
                const {isRandom, schedule: rSched, isMandatory} = randomResult;
                const baseSched = getOwnerCurrentSchedule(oc, now);
                const finalSched = isRandom && rSched ? rSched : baseSched;
                
                if (!finalSched || finalSched.area !== currentSmallArea) return null;
                
                return {
                    oc,
                    schedule: finalSched,
                    isRandom,
                    isMandatory,
                    endTime: finalSched.endTimeStr || '未知'
                };
            }).filter(Boolean);

            // 空状态处理
            if (!ocList.length) {
                container.innerHTML = '<div class="empty">当前地点暂无OC</div>';
                return;
            }

            // 渲染OC卡片
            container.innerHTML = `
            <div class="oc-grid">
                ${ocList.map(item => {
                    const {oc, schedule, isRandom, isMandatory, endTime} = item;
                    const actionText = schedule.action || '暂无状态';
                    const randomAction = getLocationRandomAction(oc, currentSmallArea, schedule.type) || actionText;
                    const randomClass = isRandom ? 'random' : '';
                    const tagClass = isMandatory ? 'mandatory-tag' : 'laser-tag';
                    const randomTag = isRandom ? `<div class="oc-random-tag ${tagClass}">随机事件</div>` : '';
                    
                    return `
                    <div class="oc-card ${randomClass}">
                        ${randomTag}
                        <div class="oc-popup">
                            <p><span class="popup-action">行为：</span>${actionText}</p>
                            <p><span class="popup-time">停留至：</span>${endTime}</p>
                        </div>
                        <div class="oc-row">
                            <img src="${oc.avatar}" alt="${oc.name}" class="oc-avatar">
                            <div class="oc-info">
                                <div class="oc-name">${oc.name}</div>
                                <div class="oc-place">📍 ${schedule.area}</div>
                            </div>
                        </div>
                        <div class="oc-action">${randomAction}</div>
                    </div>`;
                }).join('')}
            </div>`;
        }

        // ========== 业务逻辑函数 ==========
        // 初始化大区导航
        function initAreaNav() {
            const wrap = document.getElementById('bigAreaWrap');
            const bigAreas = [...new Set(areaData.map(x => x.bigArea))];
            
            // 渲染大区标签
            wrap.innerHTML = bigAreas.map(area => `<div class="big-area-tab" data-area="${area}">${area}</div>`).join('');
            
            // 默认选中第一个大区
            currentBigArea = bigAreas[0];
            document.querySelector(`[data-area="${currentBigArea}"]`).classList.add('active');

            // 绑定大区点击事件
            document.querySelectorAll('.big-area-tab').forEach(tab => {
                tab.onclick = async e => {
                    document.querySelectorAll('.big-area-tab').forEach(x => x.classList.remove('active'));
                    e.target.classList.add('active');
                    currentBigArea = e.target.dataset.area;
                    await renderSmallArea(currentBigArea);
                    renderOC();
                    renderOwnerSidebar();
                    renderAreaInfoSidebar();
                }
            });

            // 绑定抽屉展开/收起事件
            const drawerHeader = document.getElementById('drawerHeader');
            const drawerContent = document.getElementById('drawerContent');
            const drawerArrow = document.getElementById('drawerArrow');
            
            drawerHeader.onclick = () => {
                drawerContent.classList.toggle('show');
                drawerArrow.classList.toggle('active');
                drawerArrow.innerText = drawerContent.classList.contains('show') ? '▲' : '▼';
            };

            // 初始化渲染小地点
            renderSmallArea(currentBigArea);
        }

        // 获取OC当前所在区域列表
        async function getCurrentOcAreas() {
            const now = getRealTime();
            const areaSet = new Set();
            
            ocData.forEach(oc => {
                const {isRandom, schedule: rSched} = checkRandomEvent(oc, now);
                const finalSched = isRandom && rSched ? rSched : getOwnerCurrentSchedule(oc, now);
                
                if (finalSched) {
                    const area = areaData.find(x => x.smallArea === finalSched.area);
                    if (area?.areaCode) areaSet.add(area.areaCode);
                }
            });
            
            return Array.from(areaSet);
        }

        // 高亮有OC的小地点
        async function setAreaHighlight(ocAreaCodes) {
            document.querySelectorAll('.small-area-item').forEach(item => {
                const code = item.dataset.areacode;
                item.classList.remove('has-oc');
                if (code === activeAreaCode) return;
                if (ocAreaCodes.includes(code)) item.classList.add('has-oc');
            });
        }

        // 获取OC当前基础日程
        function getOwnerCurrentSchedule(oc, now) {
            if (!oc.baseSchedule) return null;
            
            for (const sched of oc.baseSchedule) {
                if (!sched.week.includes(now.week)) continue;
                
                const [start, end] = sched.timeRange.split('-');
                const [startH, startM] = start.split(':').map(Number);
                const [endH, endM] = end.split(':').map(Number);
                
                const nowMinutes = now.hour * 60 + now.minute;
                const startMinutes = startH * 60 + startM;
                const endMinutes = endH * 60 + endM;
                
                let inRange = false;
                if (endMinutes < startMinutes) {
                    inRange = nowMinutes >= startMinutes || nowMinutes <= endMinutes;
                } else {
                    inRange = nowMinutes >= startMinutes && nowMinutes <= endMinutes;
                }
                
                if (inRange) {
                    return {
                        ...sched,
                        endTimeStr: getEndTimeDisplay(start, end, now)
                    };
                }
            }
            
            return null;
        }

        // 格式化结束时间显示
        function getEndTimeDisplay(start, end, now) {
            const [startH] = start.split(':').map(Number);
            const [endH, endM] = end.split(':').map(Number);
            const endStr = `${String(endH).padStart(2,'0')}:${String(endM).padStart(2,'0')}`;
            
            if (endH < startH) return `次日 ${endStr}`;
            if (now.hour < startH) return `当天 ${endStr}`;
            return endStr;
        }

        // 检查随机事件
        function checkRandomEvent(oc, now) {
            if (!oc.randomEvents?.length) return {isRandom: false, schedule: null, isMandatory: false};
            
            // 筛选当前时段有效的随机事件
            const validEvents = oc.randomEvents.filter(event => {
                if (!event.week.includes(now.week)) return false;
                
                const [start, end] = event.timeRange.split('-');
                const [startH, startM] = start.split(':').map(Number);
                const [endH, endM] = end.split(':').map(Number);
                
                const nowMinutes = now.hour * 60 + now.minute;
                const startMinutes = startH * 60 + startM;
                const endMinutes = endH * 60 + endM;
                
                return endMinutes < startMinutes 
                    ? (nowMinutes >= startMinutes || nowMinutes <= endMinutes) 
                    : (nowMinutes >= startMinutes && nowMinutes <= endMinutes);
            });
            
            if (!validEvents.length) return {isRandom: false, schedule: null, isMandatory: false};

            // 持久化逻辑
            const needPersist = validEvents[0].persist !== false;
            let cacheKey;
            
            if (needPersist) {
                const day = new Date().toISOString().split('T')[0];
                cacheKey = `rand_${oc.name}_${validEvents[0].week}_${validEvents[0].timeRange}_${day}`;
                
                const [start, end] = validEvents[0].timeRange.split('-');
                const [startH, startM] = start.split(':').map(Number);
                const [endH, endM] = end.split(':').map(Number);
                
                const startMinutes = startH * 60 + startM;
                const endMinutes = endH * 60 + endM;
                const nowMinutes = now.hour * 60 + now.minute;
                
                const inTime = endMinutes < startMinutes 
                    ? (nowMinutes >= startMinutes || nowMinutes <= endMinutes) 
                    : (nowMinutes >= startMinutes && nowMinutes <= endMinutes);
                
                if (!inTime) {
                    localStorage.removeItem(cacheKey);
                    return {isRandom: false, schedule: null, isMandatory: false};
                }
                
                const cached = localStorage.getItem(cacheKey);
                if (cached) {
                    const result = JSON.parse(cached);
                    // ========== 修复点5：随机事件提示使用random类型，受一次显示限制 ==========
                    if (result.isRandom && result.schedule?.tip) showTip(result.schedule.tip, 'random');
                    return result;
                }
            } else {
                const day = new Date().toLocaleDateString();
                cacheKey = `rand_${oc.name}_${day}_${now.hour}`;
                
                const cached = sessionStorage.getItem(cacheKey);
                if (cached) {
                    const result = JSON.parse(cached);
                    if (result.isRandom && result.schedule?.tip) showTip(result.schedule.tip, 'random');
                    return result;
                }
            }

            // 区分必选/可选随机事件
            const hasMandatory = validEvents.some(e => e.isMandatory);
            let hitEvent = null;

            if (hasMandatory) {
                // 必选事件：按权重100%选一个
                const mandatoryEvents = validEvents.filter(e => e.isMandatory);
                let totalWeight = 0;
                const weightMap = mandatoryEvents.map(event => {
                    totalWeight += event.probability;
                    return { event, endWeight: totalWeight };
                });
                const randomNum = Math.random() * totalWeight;
                hitEvent = weightMap.find(item => randomNum <= item.endWeight)?.event;
            } else {
                // 可选事件：低概率随机触发
                const randomEvent = validEvents[Math.floor(Math.random() * validEvents.length)];
                hitEvent = Math.random() * 100 < randomEvent.probability ? randomEvent : null;
            }

            // 组装结果
            const result = {
                isRandom: !!hitEvent,
                isMandatory: hitEvent?.isMandatory || false,
                schedule: hitEvent ? {
                    ...hitEvent,
                    endTimeStr: getEndTimeDisplay(hitEvent.timeRange.split('-')[0], hitEvent.timeRange.split('-')[1], now)
                } : null
            };
            
            // 缓存结果
            if (needPersist) {
                localStorage.setItem(cacheKey, JSON.stringify(result));
            } else {
                sessionStorage.setItem(cacheKey, JSON.stringify(result));
            }
            
            // ========== 修复点5：随机事件提示使用random类型，受一次显示限制 ==========
            if (hitEvent && hitEvent.tip) showTip(hitEvent.tip, 'random');
            
            return result;
        }

        // 获取OC随机行为文本
        function getLocationRandomAction(oc, area, type) {
            type = type || 'work';
            const actions = oc.locationRandomActions?.[area];
            let actionList = [];
            
            if (Array.isArray(actions)) {
                actionList = actions;
            } else if (actions?.[type]) {
                actionList = actions[type];
            }
            
            // 兜底逻辑
            const defaultAction = oc.baseSchedule?.find(s => s.area === area)?.action || '暂无状态';
            if (actionList.length === 0) return defaultAction;
            
            // 缓存避免频繁变化
            const cacheKey = `act_${oc.name}_${area}_${type}`;
            if (!ocActionCache[cacheKey]) {
                ocActionCache[cacheKey] = actionList[Math.floor(Math.random() * actionList.length)];
            }
            
            return ocActionCache[cacheKey];
        }

        // ========== 事件绑定 ==========
        // 模式切换事件
        modeToggle.onclick = () => isDark ? setLight() : setDark();

        // 移动端下拉刷新事件
        document.addEventListener('touchstart', (e) => {
            if (isRefreshing) return;
            if (window.scrollY <= 0) {
                pullStartY = e.touches[0].clientY;
                isPulling = true;
            }
        });

        document.addEventListener('touchmove', (e) => {
            if (!isPulling || isRefreshing) return;
            pullDistance = e.touches[0].clientY - pullStartY;
            
            if (pullDistance > 60) {
                pullRefresh.classList.add('show');
                pullRefresh.innerText = '松开刷新...';
            } else if (pullDistance > 0) {
                pullRefresh.classList.add('show');
                pullRefresh.innerText = '下拉刷新...';
            } else {
                pullRefresh.classList.remove('show');
            }
        });

        document.addEventListener('touchend', () => {
            if (!isPulling || isRefreshing) return;
            
            if (pullDistance > 60) {
                doRefresh();
            } else {
                resetPullState();
            }
        });

        // 桌面端F5刷新事件
        window.addEventListener('keydown', (e) => {
            if (e.key === 'F5') {
                e.preventDefault();
                doRefresh();
            }
        });

        // ========== 初始化 ==========
        async function init() {
            // 初始化主题
            if (savedTheme === 'light') setLight();
            else setDark();

            // 重置下拉刷新状态
            resetPullState();
            
            // ========== 修复点6：初始化时重置随机事件tips标记 ==========
            randomEventTipShown = false;
            
            try {
                // 加载数据
                const [ocRes, areaRes] = await Promise.all([
                    fetch('./ocData.json').then(r => r.json()),
                    fetch('./areaData.json').then(r => r.json())
                ]);
                ocData = ocRes;
                areaData = areaRes;

                // 初始化页面
                initAreaNav();
                updateRealTime();
                renderOC();
                renderOwnerSidebar();
                
                // 定时更新
                setInterval(updateRealTimeOnly, 1000);
                setInterval(async () => {
                    const ocAreas = await getCurrentOcAreas();
                    await setAreaHighlight(ocAreas);
                    renderOwnerSidebar();
                }, 60000);
            } catch (e) {
                console.error('初始化失败', e);
                document.getElementById('ocContainer').innerHTML = '<div class="empty">加载失败</div>';
            }
        }

        // 页面加载完成后初始化
        window.onload = init;
    </script>
</body>
</html>
