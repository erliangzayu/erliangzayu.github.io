<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🦁 Lionfish · 居民实时行踪</title>
    <style>
        /* 🌙 夜间模式（苹果灰黑系） */
        :root {
            --bg: #121212;
            --card: #1c1c1e;
            --card-light: #2c2c2e;
            --border: #3a3a3c;
            --text: #f5f5f7;
            --text2: #8e8e93;
            --text3: #636366;
            --primary: #f5a623;
            --accent: #ff9f0a;
            --shadow: 0 4px 12px rgba(0,0,0,0.4);
            /* 镭射渐变色 */
            --laser-gradient: linear-gradient(120deg, #84fab0 0%, #8fd3f4 50%, #a6c1ee 100%);
        }

        /* ☀️ 日间模式（温暖柔和奶白） */
        .light-mode {
            --bg: #fdfdfb;
            --card: #ffffff;
            --card-light: #f7f3ee;
            --border: #e8e2d9;
            --text: #2d2a26;
            --text2: #7d7871;
            --text3: #b0aaa0;
            --primary: #f78c40;
            --accent: #ff9f0a;
            --shadow: 0 4px 12px rgba(0,0,0,0.06);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background: var(--bg);
            color: var(--text);
            padding: 20px;
            min-height: 100vh;
            overflow-x: hidden;
            transition: all 0.25s ease;
        }

        /* 头部容器 - 标题居中+模式按钮靠右 */
        .header-container {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 8px;
            position: relative;
        }

        /* 模式切换按钮 */
        .mode-toggle {
            position: absolute; 
            right: 0; 
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--card);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
        }
        .mode-toggle:hover {
            transform: scale(1.05);
        }

        /* 头部 */
        .header {
            text-align: center;
            margin-bottom: 24px;
        }
        .title {
            font-size: 24px;
            font-weight: 600;
            margin: 0;
        }
        .real-clock {
            display: inline-block;
            background: var(--card-light);
            padding: 8px 16px;
            border-radius: 30px;
            color: var(--text2);
            font-size: 15px;
            margin-top: 8px;
        }
        .area-path {
            margin-top: 8px;
            font-size: 14px;
            color: var(--text2);
        }
        .tip-bar {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--primary);
            color: #fff;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            z-index: 999;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .tip-bar.show {
            opacity: 1;
        }

        /* 大区导航 */
        .big-area-scroll {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 8px 0;
            scrollbar-width: none;
            margin-bottom: 16px;
        }
        .big-area-scroll::-webkit-scrollbar {
            display: none;
        }
        .big-area-tab {
            white-space: nowrap;
            padding: 8px 16px;
            border: 2px solid var(--border);
            border-radius: 20px;
            cursor: pointer;
            transition: 0.2s;
            color: var(--text2);
            background: transparent;
        }
        .big-area-tab.active {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }

        /* 小地点抽屉 */
        .small-area-drawer-wrap {
            background: var(--card);
            border-radius: 12px;
            margin-bottom: 20px;
            overflow: hidden;
            box-shadow: var(--shadow);
        }
        .small-area-drawer-header {
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            border-bottom: 1px solid var(--border);
        }
        .small-area-drawer-title {
            font-size: 15px;
            font-weight: 600;
        }
        .small-area-drawer-arrow {
            color: var(--text2);
            transition: transform 0.3s ease;
        }
        .small-area-drawer-arrow.active {
            transform: rotate(180deg);
        }
        .small-area-drawer-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }
        .small-area-drawer-content.show {
            max-height: 200px;
            padding: 8px 0;
            overflow-y: auto;
        }

        /* 小地点 */
        .small-area-list {
            padding: 0 8px;
        }
        .small-area-item {
            padding: 10px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
            margin: 4px 0;
            color: var(--text2);
            border-left: 4px solid transparent;
        }
        .small-area-item.has-oc {
            border-left-color: var(--accent);
            color: var(--accent);
            font-weight: 500;
        }
        .small-area-item.active {
            background: var(--primary);
            color: #fff;
            border-left-color: var(--primary);
        }
        .small-area-item.not-permanent {
            display: none;
        }
        .small-area-item:hover {
            background: var(--card-light);
        }

        /* 布局 */
        .main-container {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }
        .oc-container {
            flex: 1;
        }

        /* 合并后的侧边栏容器（主人+地点介绍） */
        .combined-sidebar {
            width: 280px;
            background: var(--card);
            border-radius: 18px;
            padding: 16px;
            box-shadow: var(--shadow);
            flex-shrink: 0;
            display: none;
        }
        /* 主人栏（在上） */
        .owner-sidebar {
            margin-bottom: 16px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
            display: none;
        }
        /* 只有主人栏时去掉底部分隔线 */
        .owner-sidebar:only-child {
            margin-bottom: 0;
            padding-bottom: 0;
            border-bottom: none;
        }
        /* 地点介绍栏（在下） */
        .area-info-sidebar {
            display: none;
        }

        /* 侧边栏标题/内容样式 */
        .owner-title,
        .area-info-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 12px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 8px;
        }
        .area-info-content {
            font-size: 14px;
            color: var(--text2);
            line-height: 1.6;
        }

        /* 主人卡片 */
        .owner-card {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
        }
        .owner-avatar {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            object-fit: cover;
        }
        .owner-name {
            font-size: 15px;
            font-weight: 600;
        }
        .owner-status {
            font-size: 12px;
            color: var(--text2);
        }

        /* OC卡片 */
        .oc-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }
        .oc-card {
            position: relative;
            background: var(--card);
            border-radius: 18px;
            padding: 16px;
            box-shadow: var(--shadow);
            border-left: 4px solid var(--primary);
            transition: 0.2s;
        }
        .oc-card.random {
            border-left-color: var(--primary);
        }
        .oc-card:hover {
            transform: translateY(-3px);
        }

        /* 随机事件标签样式拆分 */
        .oc-random-tag {
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 6px;
            font-weight: 600;
        }
        /* 必选随机事件（橙色） */
        .oc-random-tag.mandatory-tag {
            background: var(--primary);
            color: #fff;
            border: 1px solid var(--accent);
        }
        /* 可选随机事件（镭射渐变） */
        .oc-random-tag.laser-tag {
            background: var(--laser-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            border: 1px solid rgba(132, 250, 176, 0.3);
        }

        .oc-avatar {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            object-fit: cover;
            margin-right: 12px;
        }
        .oc-row {
            display: flex;
            align-items: center;
        }
        .oc-info {
            flex: 1;
        }
        .oc-name {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .oc-place {
            font-size: 12px;
            color: var(--text2);
        }
        .oc-action {
            font-size: 14px;
            color: var(--text2);
            margin-top: 6px;
            line-height: 1.4;
        }

        /* 悬浮弹窗 */
        .oc-popup {
            position: absolute;
            bottom: calc(100% + 10px);
            left: 50%;
            transform: translateX(-50%);
            width: 220px;
            background: var(--card-light);
            color: var(--text);
            padding: 12px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            font-size: 13px;
            line-height: 1.5;
            z-index: 10;
            opacity: 0;
            pointer-events: none;
            transition: 0.2s;
        }
        .oc-card:hover .oc-popup {
            opacity: 1;
            pointer-events: all;
        }
        .popup-action {
            color: var(--primary);
            font-weight: 500;
        }
        .popup-time {
            color: var(--accent);
        }

        .empty {
            grid-column: span 2;
            text-align: center;
            padding: 60px 0;
            color: var(--text3);
        }

        /* 移动端适配 */
        @media (max-width: 768px) {
            .main-container {
                flex-direction: column;
            }
            .combined-sidebar {
                width: 100%;
            }
            .oc-grid {
                grid-template-columns: 1fr;
            }
            .title {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>

<!-- 提示条 -->
<div class="tip-bar" id="tipBar"></div>

<div class="header">
    <div class="header-container">
        <div class="title">🦁 Lionfish · 居民实时行踪</div>
        <div class="mode-toggle" id="modeToggle">🌙</div>
    </div>
    <div class="real-clock" id="clock">加载系统时间…</div>
    <div class="area-path" id="areaPath">1区 > 居酒屋</div>
</div>

<div class="big-area-scroll" id="bigAreaWrap"></div>

<div class="small-area-drawer-wrap">
    <div class="small-area-drawer-header" id="drawerHeader">
        <div class="small-area-drawer-title" id="drawerTitle">目前地点·居酒屋</div>
        <div class="small-area-drawer-arrow" id="drawerArrow">▼</div>
    </div>
    <div class="small-area-drawer-content" id="drawerContent">
        <div class="small-area-list" id="smallAreaList"></div>
    </div>
</div>

<div class="main-container">
    <div class="oc-container" id="ocContainer">
        <div class="empty">加载中...</div>
    </div>
    <!-- 合并后的侧边栏：主人栏在上，地点介绍在下 -->
    <div class="combined-sidebar" id="combinedSidebar">
        <div class="owner-sidebar" id="ownerSidebar">
            <div class="owner-title">📍 地点主人</div>
            <div id="ownerContent"></div>
        </div>
        <div class="area-info-sidebar" id="areaInfoSidebar">
            <div class="area-info-title">📝 地点介绍</div>
            <div class="area-info-content" id="areaInfoContent">加载地点信息中...</div>
        </div>
    </div>
</div>

<script>
    let ocData = [];
    let areaData = [];
    let currentBigArea = "";
    let currentSmallArea = "";
    let ocActionCache = {};
    let activeAreaCode = null;

    // 模式切换
    let isDark = true;
    const modeToggle = document.getElementById('modeToggle');
    const saved = localStorage.getItem('themeMode');

    function updateDrawerTitle() {
        document.getElementById('drawerTitle').innerText = `目前地点·${currentSmallArea}`;
    }

    function setDark() {
        document.body.classList.remove('light-mode');
        modeToggle.innerText = '🌙';
        isDark = true;
        localStorage.setItem('themeMode','dark');
    }
    function setLight() {
        document.body.classList.add('light-mode');
        modeToggle.innerText = '☀️';
        isDark = false;
        localStorage.setItem('themeMode','light');
    }

    if(saved === 'light') setLight();
    else setDark();

    modeToggle.onclick = () => isDark ? setLight() : setDark();

    async function init() {
        try {
            const [ocRes, areaRes] = await Promise.all([
                fetch('./ocData.json').then(r=>r.json()),
                fetch('./areaData.json').then(r=>r.json())
            ]);
            ocData = ocRes;
            areaData = areaRes;

            initAreaNav();
            updateRealTime();
            renderOC();
            renderOwnerSidebar();
            setInterval(updateRealTimeOnly, 1000);
            setInterval(async ()=>{
                const arr = await getCurrentOcAreas();
                await setAreaHighlight(arr);
                renderOwnerSidebar();
            },60000);
        } catch(e) {
            console.error(e);
            document.getElementById('ocContainer').innerHTML = '<div class="empty">加载失败</div>';
        }
    }

    async function getCurrentOcAreas() {
        const now = getRealTime();
        const set = new Set();
        ocData.forEach(oc=>{
            const {isRandom, schedule: rSched} = checkRandomEvent(oc, now);
            const s = isRandom&&rSched ? rSched : getOwnerCurrentSchedule(oc,now);
            if(s) {
                const a = areaData.find(x=>x.smallArea===s.area);
                if(a?.areaCode) set.add(a.areaCode);
            }
        });
        return Array.from(set);
    }

    function initAreaNav() {
        const wrap = document.getElementById('bigAreaWrap');
        const bigs = [...new Set(areaData.map(x=>x.bigArea))];
        wrap.innerHTML = bigs.map(a=>`<div class="big-area-tab" data-area="${a}">${a}</div>`).join('');
        currentBigArea = bigs[0];
        document.querySelector(`[data-area="${currentBigArea}"]`).classList.add('active');

        document.querySelectorAll('.big-area-tab').forEach(t=>{
            t.onclick = async e=>{
                document.querySelectorAll('.big-area-tab').forEach(x=>x.classList.remove('active'));
                e.target.classList.add('active');
                currentBigArea = e.target.dataset.area;
                await renderSmallArea(currentBigArea);
                renderOC();
                renderOwnerSidebar();
                renderAreaInfoSidebar();
            }
        });

        const header = document.getElementById('drawerHeader');
        const content = document.getElementById('drawerContent');
        const arrow = document.getElementById('drawerArrow');
        header.onclick = ()=>{
            content.classList.toggle('show');
            arrow.classList.toggle('active');
            arrow.innerText = content.classList.contains('show') ? '▲' : '▼';
        };
        renderSmallArea(currentBigArea);
    }

    async function renderSmallArea(big) {
        const list = document.getElementById('smallAreaList');
        const areas = areaData.filter(x=>x.bigArea===big);
        const ocAreas = await getCurrentOcAreas();

        list.innerHTML = areas.map(item=>{
            const perm = item.isPermanent!==false;
            const has = ocAreas.includes(item.areaCode);
            const hide = !perm && !has ? 'not-permanent' : '';
            const hot = has ? 'has-oc' : '';
            return `<div class="small-area-item ${hot} ${hide}" data-area="${item.smallArea}" data-areaCode="${item.areaCode||''}">${item.smallArea}</div>`;
        }).join('');

        // 优先选第一个常驻地点，无则选第一个
        const defaultArea = areas.find(item => item.isPermanent !== false) || areas[0];
        currentSmallArea = defaultArea.smallArea;
        activeAreaCode = defaultArea.areaCode;
        
        document.querySelector(`[data-area="${currentSmallArea}"]`)?.classList.add('active');
        updateAreaPath();
        updateDrawerTitle();
        renderOwnerSidebar();
        renderAreaInfoSidebar();
        await setAreaHighlight(ocAreas);

        document.querySelectorAll('.small-area-item').forEach(i=>{
            i.onclick = async e=>{
                document.querySelectorAll('.small-area-item').forEach(x=>x.classList.remove('active'));
                e.target.classList.add('active');
                currentSmallArea = e.target.dataset.area;
                activeAreaCode = e.target.dataset.areaCode;
                updateAreaPath();
                updateDrawerTitle();
                renderOC();
                renderOwnerSidebar();
                renderAreaInfoSidebar();
                const arr = await getCurrentOcAreas();
                await setAreaHighlight(arr);
            }
        });
    }

    // 更新合并侧边栏显示状态
    function updateCombinedSidebar() {
        const combined = document.getElementById('combinedSidebar');
        const ownerSidebar = document.getElementById('ownerSidebar');
        const areaInfoSidebar = document.getElementById('areaInfoSidebar');
        // 有任一子栏显示则显示合并容器
        const hasContent = ownerSidebar.style.display === 'block' || areaInfoSidebar.style.display === 'block';
        combined.style.display = hasContent ? 'block' : 'none';
    }

    function renderAreaInfoSidebar() {
        const info = areaData.find(x=>x.smallArea===currentSmallArea&&x.bigArea===currentBigArea);
        const side = document.getElementById('areaInfoSidebar');
        const c = document.getElementById('areaInfoContent');
        if(!info) {
            side.style.display = 'none';
        } else {
            side.style.display = 'block';
            c.innerText = info.areaIntro || '暂无介绍';
        }
        updateCombinedSidebar(); // 同步更新合并容器
    }

    async function setAreaHighlight(arr) {
        document.querySelectorAll('.small-area-item').forEach(i=>{
            const code = i.dataset.areacode;
            i.classList.remove('has-oc');
            if(code===activeAreaCode) return;
            if(arr.includes(code)) i.classList.add('has-oc');
        });
    }

    function updateAreaPath() {
        document.getElementById('areaPath').innerText = `${currentBigArea} > ${currentSmallArea}`;
    }

    function getRealTime() {
        const d = new Date();
        const wd = ['周日','周一','周二','周三','周四','周五','周六'][d.getDay()];
        const h = String(d.getHours()).padStart(2,'0');
        const m = String(d.getMinutes()).padStart(2,'0');
        return {
            week: d.getDay(),
            hour: d.getHours(),
            minute: d.getMinutes(),
            str: `${wd} ${h}:${m}`
        };
    }

    function updateRealTime() {
        document.getElementById('clock').innerText = `当前时间 · ${getRealTime().str}`;
    }
    function updateRealTimeOnly() {
        document.getElementById('clock').innerText = `当前时间 · ${getRealTime().str}`;
    }

    function getOwnerCurrentSchedule(oc, now) {
        if(!oc.baseSchedule) return null;
        for(const s of oc.baseSchedule) {
            if(!s.week.includes(now.week)) continue;
            const [st,ed] = s.timeRange.split('-');
            const [sh,sm] = st.split(':').map(Number);
            const [eh,em] = ed.split(':').map(Number);
            const nowM = now.hour*60+now.minute;
            const sM = sh*60+sm;
            const eM = eh*60+em;
            let inRange = false;
            if(eM < sM) inRange = nowM >= sM || nowM <= eM;
            else inRange = nowM >= sM && nowM <= eM;
            if(inRange) {
                return {...s, endTimeStr:getEndTimeDisplay(st,ed,now)};
            }
        }
        return null;
    }

    function getEndTimeDisplay(st,ed,now) {
        const [sh] = st.split(':').map(Number);
        const [eh,em] = ed.split(':').map(Number);
        const end = `${String(eh).padStart(2,'0')}:${String(em).padStart(2,'0')}`;
        if(eh < sh) return `次日 ${end}`;
        if(now.hour < sh) return `当天 ${end}`;
        return end;
    }

    // 区分必选/可选随机事件
    function checkRandomEvent(oc, now) {
        if(!oc.randomEvents?.length) return {isRandom:false, schedule:null};
        
        // 筛选当前时段有效事件
        const validEvents = oc.randomEvents.filter(e=>{
            if(!e.week.includes(now.week)) return false;
            const [st,ed] = e.timeRange.split('-');
            const [sh,sm] = st.split(':').map(Number);
            const [eh,em] = ed.split(':').map(Number);
            const nowM = now.hour*60+now.minute;
            const sM = sh*60+sm;
            const eM = eh*60+em;
            return eM < sM ? (nowM >= sM || nowM <= eM) : (nowM >= sM && nowM <= eM);
        });
        if(!validEvents.length) return {isRandom:false, schedule:null};

        // 持久化逻辑
        const needPersist = validEvents[0].persist !== false;
        let key;
        if(needPersist) {
            const day = new Date().toISOString().split('T')[0];
            key = `rand_${oc.name}_${validEvents[0].week}_${validEvents[0].timeRange}_${day}`;
            const [es,ee] = validEvents[0].timeRange.split('-');
            const [esh,esm] = es.split(':').map(Number);
            const [eeh,eem] = ee.split(':').map(Number);
            const sM = esh*60+esm;
            const eM = eeh*60+eem;
            const nowM = now.hour*60+now.minute;
            const inTime = eM < sM ? (nowM >= sM || nowM <= eM) : (nowM >= sM && nowM <= eM);
            if(!inTime) { localStorage.removeItem(key); return {isRandom:false, schedule:null}; }
            const cache = localStorage.getItem(key);
            if(cache) {
                const r = JSON.parse(cache);
                if(r.isRandom && r.schedule.tip) showTip(r.schedule.tip);
                return r;
            }
        } else {
            const day = new Date().toLocaleDateString();
            key = `rand_${oc.name}_${day}_${now.hour}`;
            const cache = sessionStorage.getItem(key);
            if(cache) {
                const r = JSON.parse(cache);
                if(r.isRandom && r.schedule.tip) showTip(r.schedule.tip);
                return r;
            }
        }

        // 区分必选/可选事件
        const hasMandatory = validEvents.some(e => e.isMandatory);
        let hitEvent = null;

        if(hasMandatory) {
            // 必选事件：按权重100%选一个
            const mandatoryEvents = validEvents.filter(e => e.isMandatory);
            let totalWeight = 0;
            const weightMap = mandatoryEvents.map(e => {
                totalWeight += e.probability;
                return { event: e, endWeight: totalWeight };
            });
            const randomNum = Math.random() * totalWeight;
            hitEvent = weightMap.find(item => randomNum <= item.endWeight)?.event;
        } else {
            // 可选事件：低概率随机触发
            const ev = validEvents[Math.floor(Math.random()*validEvents.length)];
            hitEvent = Math.random()*100 < ev.probability ? ev : null;
        }

        // 组装结果（新增isMandatory标识）
        const res = {
            isRandom: !!hitEvent,
            isMandatory: hitEvent?.isMandatory || false, 
            schedule: hitEvent ? {
                ...hitEvent,
                endTimeStr: getEndTimeDisplay(hitEvent.timeRange.split('-')[0], hitEvent.timeRange.split('-')[1], now)
            } : null
        };
        
        if(needPersist) localStorage.setItem(key, JSON.stringify(res));
        else sessionStorage.setItem(key, JSON.stringify(res));
        
        if(hitEvent && hitEvent.tip) showTip(hitEvent.tip);
        return res;
    }

    function showTip(text) {
        const t = document.getElementById('tipBar');
        t.innerText = text;
        t.classList.add('show');
        setTimeout(()=>t.classList.remove('show'),4000);
    }

    function getLocationRandomAction(oc, area, type) {
        type = type || 'work';
        const acts = oc.locationRandomActions?.[area];
        let arr = [];
        if(Array.isArray(acts)) arr = acts;
        else if(acts?.[type]) arr = acts[type];
        // 兜底返回action或默认值
        const defaultAction = oc.baseSchedule?.find(s => s.area === area)?.action || '暂无状态';
        if(arr.length === 0) return defaultAction;
        const key = `act_${oc.name}_${area}_${type}`;
        if(!ocActionCache[key]) ocActionCache[key] = arr[Math.floor(Math.random()*arr.length)];
        return ocActionCache[key];
    }
    
    function renderOC() {
        const now = getRealTime();
        const container = document.getElementById('ocContainer');
        const list = ocData.map(oc=>{
            // 解构必选/可选标识
            const randomResult = checkRandomEvent(oc, now);
            const {isRandom, schedule:rSched, isMandatory} = randomResult;
            
            const base = getOwnerCurrentSchedule(oc, now);
            const final = isRandom&&rSched ? rSched : base;
            if(!final || final.area!==currentSmallArea) return null;
            return {oc, final, isRandom, isMandatory, end:final.endTimeStr||'?'};
        }).filter(Boolean);
    
        if(!list.length) {
            container.innerHTML = '<div class="empty">当前地点暂无OC</div>';
            return;
        }
    
        container.innerHTML = `
        <div class="oc-grid">
        ${list.map(x=>{
            const {oc,final,isRandom,isMandatory,end} = x;
            const actionText = final.action || '暂无状态';
            const txt = getLocationRandomAction(oc, currentSmallArea, final.type) || actionText;
            const rcls = isRandom ? 'random' : '';
            // 区分标签样式：必选=橙色，可选=镭射
            const tagClass = isMandatory ? 'mandatory-tag' : 'laser-tag';
            const tag = isRandom ? `<div class="oc-random-tag ${tagClass}">随机事件</div>` : '';
            
            return `
            <div class="oc-card ${rcls}">
                ${tag}
                <div class="oc-popup">
                    <p><span class="popup-action">行为：</span>${actionText}</p>
                    <p><span class="popup-time">停留至：</span>${end}</p>
                </div>
                <div class="oc-row">
                    <img src="${oc.avatar}" alt="${oc.name}" class="oc-avatar">
                    <div class="oc-info">
                        <div class="oc-name">${oc.name}</div>
                        <div class="oc-place">📍 ${final.area}</div>
                    </div>
                </div>
                <div class="oc-action">${txt}</div>
            </div>`;
        }).join('')}
        </div>`;
    }

    function renderOwnerSidebar() {
        const area = areaData.find(x=>x.smallArea===currentSmallArea&&x.bigArea===currentBigArea);
        const side = document.getElementById('ownerSidebar');
        const content = document.getElementById('ownerContent');
        if(!area || !area.owner?.length) {
            side.style.display = 'none';
        } else {
            side.style.display = 'block';
            const now = getRealTime();
            content.innerHTML = area.owner.map(name=>{
                const oc = ocData.find(o=>o.name===name);
                if(!oc) return '';
                const {isRandom, schedule:rSched} = checkRandomEvent(oc, now);
                const s = isRandom&&rSched ? rSched : getOwnerCurrentSchedule(oc, now);
                const here = s?.area === currentSmallArea;
                return `
                <div class="owner-card">
                    <img src="${oc.avatar}" alt="${name}" class="owner-avatar">
                    <div class="owner-info">
                        <div class="owner-name">${name}</div>
                        <div class="owner-status">${here ? '✅ 就在此处' : '🔴 暂时离开，四处走走看吧～'}</div>
                    </div>
                </div>`;
            }).join('');
        }
        updateCombinedSidebar(); // 同步更新合并容器
    }

    window.onload = init;
</script>
</body>
</html>
